# pacman.conf for HP Stream 7 ISO build
# Based on the standard Arch Linux pacman.conf with AUR helper hints removed.

[options]
HoldPkg      = pacman glibc
Architecture = x86_64
CheckSpace
ParallelDownloads = 5
Color

SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist
