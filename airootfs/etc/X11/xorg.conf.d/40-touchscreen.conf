# HP Stream 7 — touchscreen input settings
# Applies to any detected touchscreen (Silead or Goodix).

Section "InputClass"
    Identifier      "HP Stream 7 Touch"
    MatchIsTouchscreen "on"
    MatchDevicePath "/dev/input/event*"
    Driver          "libinput"
    Option          "Tapping"          "on"
    Option          "TappingDrag"      "on"
    Option          "NaturalScrolling" "true"
    Option          "CalibrationMatrix" "1 0 0 0 1 0 0 0 1"
EndSection

# Disable the trackpoint-style "pointer emulation" that some kernels
# expose for touchscreens — it confuses Onboard's auto-show.
Section "InputClass"
    Identifier      "Disable pointer emulation on touchscreen"
    MatchIsTouchscreen "on"
    MatchUSBID      "*"
    Option          "Ignore" "false"
    Option          "SendEventsMode" "enabled"
EndSection
