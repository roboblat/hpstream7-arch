# HP Stream 7 — Xorg device configuration

# ── Intel Bay Trail (i915) ──────────────────────────────────────────────────
Section "Device"
    Identifier  "Intel Bay Trail"
    Driver      "intel"
    Option      "TearFree"      "true"
    Option      "AccelMethod"   "sna"
    Option      "DRI"           "3"
EndSection

Section "Monitor"
    Identifier "DSI-1"
    Option     "Rotate" "normal"
EndSection

Section "Screen"
    Identifier "Screen0"
    Device     "Intel Bay Trail"
    Monitor    "DSI-1"
    DefaultDepth 24
    SubSection "Display"
        Depth  24
        Modes  "1280x800"
    EndSubSection
EndSection

# ── Touchscreen calibration & rotation ─────────────────────────────────────
# Match whatever libinput names the Silead/Goodix device.
Section "InputClass"
    Identifier    "HP Stream 7 Touchscreen"
    MatchIsTouchscreen "on"
    Driver        "libinput"
    Option        "CalibrationMatrix"  "1 0 0 0 1 0 0 0 1"
    Option        "TransformationMatrix" "1 0 0 0 1 0 0 0 1"
EndSection
