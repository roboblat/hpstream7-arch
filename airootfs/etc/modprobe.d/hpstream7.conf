# HP Stream 7 — kernel module configuration

# RTL8723BS — SDIO Wi-Fi + Bluetooth combo
# The driver name depends on build source: rtl8723bs (mainline staging) or
# r8723bs (out-of-tree). We alias both so whichever is present will load.
alias sdio:v024Cd0523* rtl8723bs
alias sdio:v024Cd0523* r8723bs

# Suppress spurious ACPI errors common on Bay Trail tablets
blacklist int3400_thermal

# i915 — Bay Trail (Valleyview) display engine
options i915 enable_rc6=1 enable_fbc=1 lvds_channel_mode=2

# snd_soc_sst_byt_cr_dpcm_fb — Baytrail CR audio codec glue
# (loaded automatically via ACPI but we pin options here)
options snd_soc_intel_baytrail_pcm_audio index=0

# Goodix / Silead touchscreen over I2C-HID
# The Silead driver needs a firmware file dropped in /lib/firmware/silead/
options silead_ts firmware_name=mssl1680.fw
