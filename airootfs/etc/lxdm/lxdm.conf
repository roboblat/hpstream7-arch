[base]
# ── Vaporwave LXDM login screen ─────────────────────────────────────
theme=Industrial
bg=/usr/share/backgrounds/vaporwave/sunset.png
bg_color=#1a0933
gtk_theme=Arc-Dark
numlock=0
session=/usr/bin/startlxde
greeter=/usr/lib/lxdm/lxdm-greeter-gtk
autologin=
timeout=10
lang=1
skip_password=0

[server]
arg=/usr/bin/X -background vt

[input]
# Start the on-screen keyboard at the login screen — no physical keyboard
keyboard=/usr/bin/onboard
