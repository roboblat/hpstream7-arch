# Onboard on-screen keyboard — HP Stream 7 defaults
# Vaporwave-tinted theme, sized for the 1280x800 screen.

[main]
layout=Compact
theme=/usr/share/onboard/themes/Droid.theme
system-theme-tracking-enabled=false
show-tooltips=false
start-minimized=false
xembed-onboard=true

[window]
docking-enabled=true
docking-edge=bottom
docking-shrink-workarea=true
force-to-top=true
transparent-background=true
background-transparency=25.0
window-decoration=false
window-handles=NE SE

[keyboard]
sticky-key-release-delay=1.0
touch-input=single
audible-feedback-enabled=false
default-key-action=delayed-stroke

[auto-show]
enabled=true
hide-on-key-press=true
reposition-method-floating=prevent-occlusion
