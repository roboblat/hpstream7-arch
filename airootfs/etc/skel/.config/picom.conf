# Picom compositor — vaporwave glass effect
# Soft shadows, transparency, no fancy blur (keep it light on Bay Trail GPU)

backend = "xrender";     # more reliable than glx on Bay Trail
vsync   = true;

# ── Shadows ────────────────────────────────────────────────────────
shadow         = true;
shadow-radius  = 18;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-color   = "#ff71ce";   # neon pink glow
shadow-opacity = 0.35;
shadow-exclude = [
  "class_g = 'slop'",
  "class_g = 'Conky'",
  "_GTK_FRAME_EXTENTS@:c"
];

# ── Transparency ───────────────────────────────────────────────────
opacity-rule = [
  "85:class_g = 'Alacritty'",
  "92:class_g = 'lxterminal'",
  "95:class_g = 'Pcmanfm'",
];

# ── Fading ─────────────────────────────────────────────────────────
fading         = true;
fade-in-step   = 0.04;
fade-out-step  = 0.04;
fade-delta     = 8;

# ── Rounded corners (if compiled with support) ─────────────────────
corner-radius = 8;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];
