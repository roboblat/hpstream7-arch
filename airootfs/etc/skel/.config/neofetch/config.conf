# Neofetch — Vaporwave config for HP Stream 7
print_info() {
    info title
    info underline

    info "  OS" distro
    info "  Host" model
    info "  Kernel" kernel
    info "  Uptime" uptime
    info "  Packages" packages
    info "  Shell" shell
    info "  Resolution" resolution
    info "  DE" de
    info "  WM" wm
    info "  Terminal" term
    info "  CPU" cpu
    info "  Memory" memory

    info cols
}

title_fqdn="off"
kernel_shorthand="on"
distro_shorthand="off"
os_arch="on"
uptime_shorthand="tiny"
memory_percent="on"
package_managers="on"

colors=(5 13 5 13 5 7)      # magenta / pink palette
bold="on"
underline_enabled="on"
underline_char="═"
separator=" ▸"

color_blocks="on"
block_range=(0 15)
block_width=3
block_height=1
col_offset="auto"

bar_char_elapsed="─"
bar_char_total="═"
bar_border="off"
bar_length=15
bar_color_elapsed="magenta"
bar_color_total="cyan"

image_backend="ascii"
ascii_distro="arch_small"    # small logo fits the 1280×800 screen
ascii_colors=(5 13 7)
ascii_bold="on"
gap=3
