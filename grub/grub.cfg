# GRUB config for HP Stream 7 live ISO
# Both ia32-efi (for the 32-bit UEFI firmware) and x86_64-efi entries are present.

set default=0
set timeout=5
set gfxmode=1280x800x32
set gfxpayload=keep

insmod all_video
insmod gfxterm
insmod gfxmenu
terminal_output gfxterm

# ── HP Stream 7 specific kernel params ────────────────────────────────────────
# intel_idle.max_cstate=1  — prevents Bay Trail freeze on deep C-states
# clocksource=tsc          — avoids unreliable HPET on Bay Trail
# usbcore.autosuspend=-1   — keeps USB OTG reliable
set STREAM7_PARAMS="intel_idle.max_cstate=1 clocksource=tsc tsc=reliable \
  i915.fastboot=1 i915.enable_rc6=1 \
  usbcore.autosuspend=-1"

menuentry "Arch Linux — HP Stream 7 (Live)" {
    set gfxpayload=keep
    linux  /arch/boot/x86_64/vmlinuz-linux archisolabel=%ARCHISO_LABEL% \
           loglevel=3 quiet systemd.show_status=auto rd.udev.log_level=3 \
           $STREAM7_PARAMS
    initrd /arch/boot/x86_64/initramfs-linux.img
}

menuentry "Arch Linux — HP Stream 7 (verbose boot)" {
    set gfxpayload=keep
    linux  /arch/boot/x86_64/vmlinuz-linux archisolabel=%ARCHISO_LABEL% \
           loglevel=7 $STREAM7_PARAMS
    initrd /arch/boot/x86_64/initramfs-linux.img
}

menuentry "UEFI Shell" {
    insmod chain
    chainloader /shellx64.efi
}

menuentry "Reboot" {
    reboot
}

menuentry "Shutdown" {
    halt
}
