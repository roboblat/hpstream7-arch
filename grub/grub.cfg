# GRUB config for HP Stream 7 live ISO
# Both ia32-efi (for the 32-bit UEFI firmware) and x86_64-efi entries are present.

set default=0
set timeout=5
set gfxmode=1280x800x32
set gfxpayload=keep

insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660
insmod udf
insmod search_fs_uuid
insmod search_label
insmod all_video
insmod font
insmod gfxterm
insmod gfxmenu

# Locate the ISO by label so $root points at the live medium, not the ESP.
search --no-floppy --set=root --label %ARCHISO_LABEL%

terminal_output gfxterm

# ── HP Stream 7 specific kernel params ────────────────────────────────────────
# intel_idle.max_cstate=1  — prevents Bay Trail freeze on deep C-states
# clocksource=tsc          — avoids unreliable HPET on Bay Trail
# usbcore.autosuspend=-1   — keeps USB OTG reliable
set STREAM7_PARAMS="intel_idle.max_cstate=1 clocksource=tsc tsc=reliable i915.fastboot=1 i915.enable_rc6=1 usbcore.autosuspend=-1"

menuentry "Arch Linux — HP Stream 7 (Live) [BUILD v12]" {
    set gfxpayload=keep
    linux  /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% rootdelay=15 rd.retry=30 loglevel=7 $STREAM7_PARAMS
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
}

menuentry "Arch Linux — HP Stream 7 (copytoram — try if USB is slow)" {
    set gfxpayload=keep
    linux  /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% copytoram rootdelay=15 rd.retry=30 loglevel=7 $STREAM7_PARAMS
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
}

menuentry "Reboot" {
    reboot
}

menuentry "Shutdown" {
    halt
}
